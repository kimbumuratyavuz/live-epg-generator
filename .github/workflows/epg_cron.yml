name: Günlük Otomatik EPG Güncelleyici

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repo kodlarını bilgisayara çek
        uses: actions/checkout@v3

      - name: Python Kurulumunu Yap
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Python Scriptini Çalıştır ve EPG XML Oluştur
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python epg_generator.py

      - name: Oluşan EPG XML Dosyasını Repoya Commit et ve Pushla
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add epg.xml
          git diff-index --quiet HEAD || git commit -m "Günlük EPG Güncellemesi: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
