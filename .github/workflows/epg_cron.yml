name: EPG Güncelleme

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *' # Her sabah 03:00'te çalışır

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Repo kodlarını bilgisayara çek
        uses: actions/checkout@v4

      - name: Python Kurulumunu Yap
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Gerekli kütüphaneleri yükle
        run: |
          pip install google-generativeai

      - name: Python Scriptini Çalıştır
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python epg_generator.py

      - name: Değişiklikleri Kaydet
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add epg.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "EPG güncellendi" && git push)
